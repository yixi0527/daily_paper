version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: daily_paper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/daily_paper
      RUN_SCHEDULER: "false"
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: >
      sh -c "python scripts/run_alembic.py upgrade head &&
             python -m app.cli seed-journals &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

  scheduler:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/daily_paper
      RUN_SCHEDULER: "false"
    depends_on:
      - db
      - api
    command: >
      sh -c "python -m app.cli seed-journals &&
             python -m app.cli scheduler"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_APP_MODE: live
        VITE_API_BASE_URL: http://localhost:8000/api
        VITE_GITHUB_PAGES_BASE: /
        VITE_STATIC_DATA_BASE: /data
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:

